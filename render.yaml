# Render blueprint: the always-on queue worker for a Vercel-hosted web app.
#
# The web console runs on Vercel (serverless), which cannot host a long-lived
# process. This worker continuously drains the runtime-resume queue by calling
# the web app's authenticated drain endpoint, so parked recoveries resume
# without a per-request cron.
#
# Deploy:
#   1. Render dashboard → New → Blueprint → point at this repo.
#   2. Set the two sync:false secrets in the dashboard:
#        REVIVE_BASE_URL       = https://revivelabs.app   (your Vercel URL)
#        REVIVE_WORKER_SECRET  = same value as in Vercel env
#   3. Deploy. The worker needs no database access; it only calls the web API.
services:
  - type: worker
    name: revive-worker
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: REVIVE_BASE_URL
        sync: false
      - key: REVIVE_WORKER_SECRET
        sync: false

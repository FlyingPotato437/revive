services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: revive
      POSTGRES_PASSWORD: revive
      POSTGRES_DB: revive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revive"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - revive-postgres:/var/lib/postgresql/data

volumes:
  revive-postgres:
